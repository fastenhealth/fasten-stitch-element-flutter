name: Publish package
# NOTE: https://dart.dev/tools/pub/automated-publishing
#  Pub.dev only allows automated publishing from GitHub Actions when the workflow is triggered by pushing a git tag to
# GitHub. Pub.dev rejects publishing from GitHub Actions triggered without a tag. This ensures that new versions cannot
# be published by events that should never trigger publishing.

on:
  #  push:
  #    tags:
  #      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write # Required for OIDC authentication
  contents: write # Allows the workflow to read repository contents
concurrency:
  group: flutter-release
  cancel-in-progress: false

# see: https://gist.github.com/jaywcjlove/a178278521a6f72c74525d3f1d9c4bf9
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Use internal caching for faster execution times
          cache: true

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: flutter pub get
      - name: Run Dart Analyzer
        run: flutter analyze

      - name: Bump version
        id: bump
        run: |
          dart pub bump "${{ inputs.bump }}"
          echo "version=$(awk '/^version:/ {print $2}' pubspec.yaml)" >> "$GITHUB_OUTPUT"
          echo "tag=v$(awk '/^version:/ {print $2}' pubspec.yaml)" >> "$GITHUB_OUTPUT"
      - name: Commit version bump
        run: |
          git add pubspec.yaml
          git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip ci]"
          git tag v${{ steps.bump.outputs.tag }}

      - name: Build & Run Package Tests
        run: flutter test

      - name: Push commit and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true